name: Deploy to GitHub Pages

# Build the Vite app and publish dist/ to GitHub Pages on every push to main.
on:
  push:
    branches: [main]
  workflow_dispatch: # allow a manual run from the Actions tab

# Permissions the deploy-pages action needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time; let an in-progress one finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # No `version:` here — pnpm/action-setup reads the version from the
      # `packageManager` field in package.json (pnpm@10.11). Pinning a version here
      # as well makes action-setup fail with "Multiple versions of pnpm specified".
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - uses: actions/configure-pages@v5
        with:
          enablement: true # turn Pages ON automatically (no manual repo-settings toggle)

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
