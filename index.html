<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Allogamy</title>
    <style>
      :root { color-scheme: dark; }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #0b1f2a; }
      canvas { display: block; }

      #overlay {
        position: fixed; inset: 0; z-index: 10;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: 1.2rem;
        background: radial-gradient(120% 120% at 50% 40%, #163a4d 0%, #0b1f2a 70%);
        color: #eaf6fb;
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
        transition: opacity 1.1s ease;
      }
      #overlay.hidden { opacity: 0; pointer-events: none; }
      #overlay h1 {
        font-weight: 300; font-size: clamp(2rem, 7vw, 4.2rem); letter-spacing: 0.32em;
        text-transform: lowercase; text-indent: 0.32em;
        background: linear-gradient(90deg, #a6d94f, #cfeef7); -webkit-background-clip: text; background-clip: text; color: transparent;
      }
      #overlay .sub { font-size: 0.82rem; letter-spacing: 0.18em; text-transform: uppercase; opacity: 0.6; }
      #overlay .spin { width: 26px; height: 26px; border: 2px solid rgba(255,255,255,0.18); border-top-color: #a6d94f; border-radius: 50%; animation: spin 0.9s linear infinite; }
      @keyframes spin { to { transform: rotate(360deg); } }
      #overlay .err { max-width: 640px; padding: 1rem 1.4rem; font-size: 0.85rem; line-height: 1.5; color: #ffd7d7; background: rgba(120,20,20,0.35); border: 1px solid rgba(255,120,120,0.3); border-radius: 10px; white-space: pre-wrap; display: none; font-family: ui-monospace, monospace; }

      #hud {
        position: fixed; left: 50%; bottom: 22px; transform: translateX(-50%); z-index: 5;
        display: flex; gap: 1.4rem; padding: 0.55rem 1.1rem;
        font-family: ui-sans-serif, system-ui, sans-serif; font-size: 0.72rem; letter-spacing: 0.14em; text-transform: uppercase;
        color: rgba(255,255,255,0.82); background: rgba(10,30,40,0.28); backdrop-filter: blur(8px);
        border: 1px solid rgba(255,255,255,0.12); border-radius: 999px;
        opacity: 0; transition: opacity 0.8s ease 0.4s; pointer-events: none;
      }
      #hud.show { opacity: 1; }
      #hud b { color: #cfeef7; font-weight: 600; }

      #phone-btn {
        position: fixed; right: 16px; bottom: 22px; z-index: 6;
        padding: 0.55rem 1rem; font-size: 0.7rem; letter-spacing: 0.14em; text-transform: uppercase;
        color: rgba(255,255,255,0.85); background: rgba(10,30,40,0.32); backdrop-filter: blur(8px);
        border: 1px solid rgba(255,255,255,0.14); border-radius: 999px; cursor: pointer;
        font-family: ui-sans-serif, system-ui, sans-serif; transition: background 0.15s ease;
      }
      #phone-btn:hover { background: rgba(10,30,40,0.5); }
      #phone-btn.on { background: rgba(120,170,90,0.6); color: #fff; border-color: rgba(160,210,120,0.5); }
    </style>
  </head>
  <body>
    <div id="overlay">
      <h1>allogamy</h1>
      <div class="spin"></div>
      <div class="sub">growing the world…</div>
      <pre class="err" id="err"></pre>
    </div>
    <div id="hud">
      <span><b>← →</b> tilt &amp; turn</span>
      <span><b>↑ ↓</b> climb &amp; dive</span>
    </div>
    <button id="phone-btn">fly with phone</button>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
